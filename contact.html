<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — AI Income Lab</title>
  <link rel="canonical" href="https://highlowmystery.github.io/contact.html">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-logo"><div class="nav-logo-mark">⚡</div><span class="nav-logo-text">AI Income Lab</span></a>
    <div class="nav-links"><a href="index.html" class="nav-link">Home</a><a href="blog.html" class="nav-link">Articles</a><a href="about.html" class="nav-link">About</a></div>
  </div>
</nav>
<main><div class="container-sm" style="padding:48px 24px">
  <h1 style="font-size:28px;font-weight:800;margin-bottom:8px">Contact</h1>
  <p style="color:var(--muted);margin-bottom:32px">Questions, feedback, or partnership inquiries — reach out below.</p>
  <div class="card" style="max-width:480px">
    <form onsubmit="event.preventDefault();this.innerHTML='<p style=color:var(--green)>✓ Message received — we\'ll reply within 48 hours.</p>'">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px">Your email</label>
        <input type="email" required placeholder="you@example.com" style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none">
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px">Subject</label>
        <input type="text" required placeholder="What's this about?" style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px">Message</label>
        <textarea required rows="5" placeholder="Your message..." style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;resize:vertical"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
    </form>
  </div>
</div></main>
<footer class="footer"><div class="container">
  <div class="footer-inner"><span>© 2025 AI Income Lab</span>
    <div class="footer-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="privacy.html">Privacy</a></div>
  </div>
</div></footer>
</body>
</html>
